<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PageRank Simulator</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container">

    <header class="app-header">
      <h1>PageRank Simulator</h1>
      <p class="subtitle">
        Monte Carlo simulation of Google's early PageRank — a Markov chain random surfer model
      </p>
    </header>

    <section class="controls">
      <div class="control-group">
        <label for="numPages">Pages (2–20)</label>
        <input type="number" id="numPages" min="2" max="20" value="6" />
      </div>

      <div class="control-group">
        <label for="speed">Speed — <span id="speedLabel">5 steps/sec</span></label>
        <input type="range" id="speed" min="1" max="60" value="5" />
      </div>

      <div class="control-group">
        <label for="damping">Damping factor — <span id="dampingLabel">0.85</span></label>
        <input type="range" id="damping" min="0" max="100" value="85" />
      </div>

      <div class="button-group">
        <button id="generateBtn" class="btn btn-primary">Generate Pages</button>
        <button id="runBtn"      class="btn btn-success"  disabled>&#9654; Run</button>
        <button id="stopBtn"     class="btn btn-danger"   disabled>&#9632; Stop</button>
        <button id="resetBtn"    class="btn btn-secondary" disabled>&#8635; Reset</button>
      </div>
    </section>

    <section class="stats" id="stats" style="display:none">
      <div class="stat-item">
        <span class="stat-label">Total Steps</span>
        <span class="stat-value" id="stepCount">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Current Page</span>
        <span class="stat-value" id="currentPage">—</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Damping Factor</span>
        <span class="stat-value" id="dampingDisplay">0.85</span>
      </div>
    </section>

    <div id="graphViz" class="graph-container" style="display:none"></div>

    <section class="legend" id="legend" style="display:none">
      <h2>Link Structure</h2>
      <div class="links-list" id="linksList"></div>
    </section>

  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
